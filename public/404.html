<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      var pathSegmentsToKeep = 0;
      var location = window.location;
      location.replace(
        location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          location.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/') +
          (location.search
            ? '&' + location.search.slice(1).replace(/&/g, '~and~')
            : '') +
          location.hash
      );
    </script>
  </head>
  <body></body>
</html>
